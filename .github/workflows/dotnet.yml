name: .NET

on:
  push:
  pull_request:
    branches: [master, develop]
    paths-ignore:
      - "README.md"

permissions:
  contents: read

env:
  SOLUTION: src/Snowberry.DependencyInjection.sln
  TEST_PROJECT: src/Tests/Snowberry.DependencyInjection.Tests/Snowberry.DependencyInjection.Tests.csproj
  PACKAGE_OUTPUT: Artifacts
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "1"

jobs:
  # Compiles the whole solution (lib, abstractions, benchmarks, AOT console, tests).
  # Runs on Windows so the net48 test target can build.
  build:
    name: Build solution
    runs-on: windows-latest
    env:
      BUILD_CONFIGURATION: ${{ (github.ref_name == 'main' || github.ref_name == 'master' || startsWith(github.ref_name, 'release/')) && 'Release' || 'Debug' }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.x
            9.x
            10.x

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION }}

      - name: Build
        run: dotnet build ${{ env.SOLUTION }} --configuration ${{ env.BUILD_CONFIGURATION }} --no-restore --nologo --verbosity quiet

  # Runs the test project per target framework.
  # net8.0/net9.0/net10.0 execute on Linux, net48 on Windows.
  test:
    name: Test ${{ matrix.framework }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            framework: net8.0
          - os: ubuntu-latest
            framework: net9.0
          - os: ubuntu-latest
            framework: net10.0
          - os: windows-latest
            framework: net48
    env:
      BUILD_CONFIGURATION: ${{ (github.ref_name == 'main' || github.ref_name == 'master' || startsWith(github.ref_name, 'release/')) && 'Release' || 'Debug' }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.x
            9.x
            10.x

      - name: Restore
        run: dotnet restore ${{ env.TEST_PROJECT }}

      - name: Build
        run: dotnet build ${{ env.TEST_PROJECT }} --framework ${{ matrix.framework }} --configuration ${{ env.BUILD_CONFIGURATION }} --no-restore --nologo --verbosity quiet

      - name: Test
        run: dotnet test ${{ env.TEST_PROJECT }} --framework ${{ matrix.framework }} --configuration ${{ env.BUILD_CONFIGURATION }} --no-build --no-restore --nologo --verbosity quiet

  # Packs the whole solution and pushes every produced package on a v* tag.
  # Only the library + abstractions are packable (everything else sets
  # IsPackable=false), so the wildcard push only uploads those.
  # Runs on Windows so the solution's net48 target can build.
  publish:
    name: Publish to NuGet
    runs-on: ubuntu-latest
    needs: [build, test]
    if: startsWith(github.ref, 'refs/tags/v')
    env:
      NUGET_KEY: ${{ secrets.NUGET_KEY }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.x
            9.x
            10.x

      - name: Pack
        run: dotnet pack ${{ env.SOLUTION }} --configuration Release --output ${{ env.PACKAGE_OUTPUT }} --nologo --verbosity quiet

      - name: Publish to NuGet
        run: dotnet nuget push "${{ env.PACKAGE_OUTPUT }}/*.nupkg" --api-key "$env:NUGET_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate
